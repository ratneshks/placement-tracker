databases:
  - name: placement-tracker-db
    databaseName: placementtracker
    plan: free

services:
  # Backend (Spring Boot)
  - type: web
    name: placement-tracker-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: placement-tracker-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: placement-tracker-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: placement-tracker-db
          property: password

  # Frontend (Static/Nginx via Docker)
  - type: web
    name: placement-tracker-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: placement-tracker-backend
          property: url
